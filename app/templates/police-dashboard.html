<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Police Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background-color: #f4f4f4;
    }

    h1, h2 {
      text-align: center;
      color: #333;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .logout-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 5px;
      background-color: #dc3545;
      color: white;
      cursor: pointer;
    }

    .logout-btn:hover {
      background-color: #b52a37;
    }

    #searchBar {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      margin-bottom: 2rem;
      background-color: white;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background-color: #007BFF;
      color: white;
    }

    img {
      width: 100px;
      height: auto;
      border-radius: 8px;
    }

    .no-records {
      text-align: center;
      color: #999;
      font-size: 1.1rem;
      margin-top: 1rem;
      margin-bottom: 2rem;
    }

    .section-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    .action-btn {
      padding: 6px 10px;
      margin: 2px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .approve-btn {
      background-color: #28a745;
      color: white;
    }

    .delete-btn {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

<script>
  const token = localStorage.getItem("access_token");
  if (!token) {
    alert("Police login required");
    window.location.href = "/police-login";
  }
</script>

<div class="top-bar">
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<h1>👮 Police Dashboard</h1>

<input type="text" id="searchBar" placeholder="Search by name, place, description, or predicted match...">

<div class="section-box">
  <h2>Registered Missing Persons</h2>
  <div id="missing-persons-content">Loading missing persons data...</div>
</div>

<div class="section-box">
  <h2>Suspicious Upload Reports</h2>
  <div id="suspicious-reports-content">Loading suspicious reports...</div>
</div>

<script>
  let missingPersonsData = [];
  let suspiciousReportsData = [];

  document.addEventListener("DOMContentLoaded", () => {
    loadMissingPersons();
    loadSuspiciousReports();

    document.getElementById("searchBar").addEventListener("input", function(e) {
      const keyword = e.target.value.toLowerCase();

      const filteredMissing = missingPersonsData.filter(person =>
        (person.name || "").toLowerCase().includes(keyword) ||
        (person.last_seen_place || "").toLowerCase().includes(keyword) ||
        (person.description || "").toLowerCase().includes(keyword)
      );

      const filteredSuspicious = suspiciousReportsData.filter(report =>
        (report.predicted_name || "").toLowerCase().includes(keyword) ||
        (report.location || "").toLowerCase().includes(keyword) ||
        (report.description || "").toLowerCase().includes(keyword)
      );

      renderMissingPersonsTable(filteredMissing);
      renderSuspiciousReportsTable(filteredSuspicious);
    });
  });

  function loadMissingPersons() {
    fetch("/api/missing-persons", {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${localStorage.getItem("access_token")}`
      }
    })
    .then(res => res.json())
    .then(data => {
      missingPersonsData = data;
      renderMissingPersonsTable(data);
    })
    .catch(err => {
      document.getElementById("missing-persons-content").innerHTML =
        `<p class="no-records">Failed to load missing persons: ${err.message}</p>`;
    });
  }

  function loadSuspiciousReports() {
    fetch("/api/suspicious-reports", {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${localStorage.getItem("access_token")}`
      }
    })
    .then(res => res.json())
    .then(data => {
      suspiciousReportsData = data;
      renderSuspiciousReportsTable(data);
    })
    .catch(err => {
      document.getElementById("suspicious-reports-content").innerHTML =
        `<p class="no-records">Failed to load suspicious reports: ${err.message}</p>`;
    });
  }

  function renderMissingPersonsTable(data) {
    const container = document.getElementById("missing-persons-content");

    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '<p class="no-records">No missing person records found.</p>';
      return;
    }

    let html = `
      <table>
        <thead>
          <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Last Seen Place</th>
            <th>Description</th>
            <th>Last Seen</th>
            <th>Added Time</th>
          </tr>
        </thead>
        <tbody>
    `;

    data.forEach(person => {
      html += `
        <tr>
          <td>
            ${person.photo_url
              ? `<img src="${person.photo_url}" alt="Photo">`
              : `No Image`
            }
          </td>
          <td>${escapeHtml(person.name || "Unknown")}</td>
          <td>${escapeHtml(person.last_seen_place || "Unknown")}</td>
          <td>${escapeHtml(person.description || "No description")}</td>
          <td>${escapeHtml(person.last_seen || "Unknown")}</td>
          <td>${escapeHtml(person.timestamp || "Unknown")}</td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  function renderSuspiciousReportsTable(data) {
    const container = document.getElementById("suspicious-reports-content");

    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '<p class="no-records">No suspicious upload reports found.</p>';
      return;
    }

    let html = `
      <table>
        <thead>
          <tr>
            <th>Uploaded Photo</th>
            <th>Predicted Match</th>
            <th>Similarity</th>
            <th>Location</th>
            <th>Description</th>
            <th>Uploaded Time</th>
          </tr>
        </thead>
        <tbody>
    `;

    data.forEach(report => {
      html += `
        <tr>
          <td>
            ${report.photo_url
              ? `<img src="${report.photo_url}" alt="Suspicious Photo">`
              : `No Image`
            }
          </td>
          <td>${escapeHtml(report.predicted_name || "Unknown")}</td>
          <td>${Number(report.confidence || 0).toFixed(2)}</td>
          <td>${escapeHtml(report.location || "Unknown")}</td>
          <td>${escapeHtml(report.description || "No description")}</td>
          <td>${escapeHtml(report.timestamp || "Unknown")}</td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  function escapeHtml(text) {
    if (typeof text !== "string") {
      text = String(text);
    }

    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function logout() {
    localStorage.removeItem("access_token");
    window.location.href = "/";
  }
</script>

</body>
</html>
